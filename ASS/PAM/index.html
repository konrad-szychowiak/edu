## Basic Information

The PAM system is a set of libraries (modules, plugins) used to authenticate users in the system. The appropriate library is used when the authentication policy for a given application invokes the authentication procedure. Modules also define additional requirements and tasks for the authentication system, such as limiting login time to specific hours and specifying various user data sources (LDAP database, MySQL, etc.).
- Authentication Management (auth)
- Account Management (account)
- Password Management (password)
- Session Management (session)

# Tasks

> Attention! Work in pairs!

1. **Which PAM module is responsible for managing user login times?**
Allow user test to log in via SSH on all weekdays except Monday, during a selected 10-minute interval (choose the time so that you can verify the effect of the command).

2. **Which PAM module is responsible for restricting access to users with specific names from specified locations?**
Add this module to the sshd daemon policy. Block SSH logins for the test user from the remote system.

Introduce a default deny access rule in this module and allow the neighbor SSH access for all users outside the test_group group.

3. **Which module allows password history verification?**

Add to the previously configured restrictions a check to verify that the entered password is different from the previous two. Ensure that the module does not ask for a password that has already been entered once.
