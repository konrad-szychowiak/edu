# Czym jest PAM?
- Jak normalnie przebiega autoryzacja w systemie Linux?
- Gdzie przechowywane są dane uwierzytelniające?
- Czy słyszeliście kiedyś o PAM?
- Czym jest PAM i do czego służy?
- Czy korzystaliście już z VLAB?

## Uwaga!

> Pozostawienie błędnych ustawień w modułach PAM może utrudnić kolejnym grupom przeprowadzenie zajęć laboratoryjnych. Po zakończeniu zajęć koniecznie uruchom system Linux Lokalny Czysty.

---

## Podstawowe informacje

System PAM to zestaw bibliotek (modułów, wtyczek), które są wykorzystywane do uwierzytelniania użytkowników w systemie. Odpowiednia biblioteka jest wykorzystywana gdy polityka uwierzytelniania dla danej aplikacji wywołuje procedurę uwierzytelniającą. Moduły określają też dodatkowe wymagania i zadania systemu uwierzytelniającego, jak np. ograniczenie czasu logowania do konkretnych godzin, określenie różnych źródeł danych o użytkownikach (baza LDAP, MySQL i inne).
- Zarządzanie uwierzytelnianiem (ang. auth)
- Zarządzanie kontami (ang. account)
- Zarządzanie hasłami (ang. password)
- Zarządzanie sesjami (ang. session)

# Przykład

1. Znajdźcie i zobaczcie swój plik passwd oraz shadow.
2. Znajdźcie jakie moduły PAM są zdefiniowane dla demona SSH.
3. Znajdźcie dokumentację dla pam_nologin (man pam_nologin).
4. Dodajcie pam_nologin do SSH.
5. Dodajcie grupę test_group oraz użytkownika test przypisanego do tej grupy.

# Zadania

> Uwaga! Praca w parach!

1. **Który moduł PAM odpowiada za zarządzanie czasem logowania użytkowników?**
    Zezwól użytkownikowi test na logowanie przez ssh we wszystkie robocze dni tygodnia z wyjątkiem poniedziałku, w wybranym 10-minutowym przedziale czasu (czas dobierz tak, by można zweryfikować efekt działania polecenia).

2.  **Który moduł PAM odpowiada za ograniczanie dostępu użytkowników o określonych nazwach ze wskazanych lokalizacji?**
    Dodaj ten moduł do polityki demona sshd.
    Zablokuj możliwość logowania przez ssh dla użytkownika test ze zdalnego systemu.
    Wprowadź w tym module regułę domyślnej odmowy dostępu i zezwól sąsiadowi na dostęp przez SSH dla wszystkich użytkowników spoza grupy test_group.

3. **Który moduł pozwala na weryfikację historii haseł?**
    Dodaj do uprzednio skonfigurowanych ograniczeń weryfikację, czy wprowadzone hasło jest różne od dwóch poprzednich. Zapewnij, by moduł nie pytał ponownie o podanie już raz wcześniej wprowadzonego hasła.
